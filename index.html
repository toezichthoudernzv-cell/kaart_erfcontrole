<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'IBM Plex Sans',sans-serif;background:#0d1117;color:#e6edf3;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
#header{background:#161b22;border-bottom:2px solid #21262d;padding:9px 14px 8px;flex-shrink:0;}
#htop{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
h1{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:#58a6ff;letter-spacing:.06em;}
#stats{display:flex;gap:10px;}
.stat{display:flex;align-items:center;gap:5px;font-size:12px;font-family:'IBM Plex Mono',monospace;font-weight:600;}
.dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;border:2px solid rgba(255,255,255,.2);}

#plbl{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#e6edf3;font-weight:600;white-space:nowrap;min-width:95px;text-align:right;}
#ritbar{background:#0d1117;border-bottom:1px solid #21262d;padding:5px 14px;display:none;flex-shrink:0;}
#ritbar-inner{display:flex;gap:16px;flex-wrap:wrap;align-items:center;}
.rit-stat{display:flex;flex-direction:column;align-items:center;}
.rit-val{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:#58a6ff;}
.rit-lbl{font-size:9px;color:#6e7681;font-family:'IBM Plex Mono',monospace;}
#vandaag-badge{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#3fb950;background:#1a3d1f;border:1px solid #3fb950;border-radius:12px;padding:2px 8px;white-space:nowrap;}
#loading{position:absolute;inset:0;background:#0d1117;z-index:3000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
#loading h2{font-family:'IBM Plex Mono',monospace;font-size:13px;color:#58a6ff;}
#loadmsg{font-size:11px;color:#8b949e;font-family:'IBM Plex Mono',monospace;max-width:300px;text-align:center;line-height:1.6;}

#loadbar-fill{height:100%;width:0%;background:#58a6ff;border-radius:4px;transition:width .3s;}
.spinner{width:34px;height:34px;border:3px solid #21262d;border-top-color:#58a6ff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#map{flex:1;}
#bot{background:#161b22;border-top:1px solid #21262d;padding:6px 10px;display:flex;gap:5px;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.btn{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:7px 10px;border-radius:6px;border:1px solid #30363d;background:#21262d;color:#e6edf3;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;user-select:none;}
.btn:active,.btn.on{background:#1a3a5c;border-color:#58a6ff;color:#58a6ff;}
#alert{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#0d1117;border:2px solid #f85149;border-radius:14px;padding:18px 20px;z-index:2500;display:none;text-align:center;min-width:260px;max-width:310px;box-shadow:0 8px 40px rgba(248,81,73,.4);}
#alert h3{font-family:'IBM Plex Mono',monospace;font-size:13px;color:#f85149;margin-bottom:8px;}
#alert p{font-size:12px;color:#e6edf3;line-height:1.6;}
#alert-nav{display:block;width:100%;margin-top:10px;padding:8px;font-size:11px;font-family:'IBM Plex Mono',monospace;background:#21262d;border:1px solid #58a6ff;color:#58a6ff;border-radius:5px;cursor:pointer;}
#alert-close{display:block;width:100%;margin-top:5px;padding:6px;font-size:10px;font-family:'IBM Plex Mono',monospace;background:transparent;border:1px solid #30363d;color:#8b949e;border-radius:5px;cursor:pointer;}
#her-alert{position:absolute;top:20px;left:50%;transform:translateX(-50%);background:#3d2a0a;border:2px solid #ff9500;border-radius:10px;padding:10px 16px;z-index:2400;display:none;text-align:center;min-width:240px;box-shadow:0 4px 20px rgba(255,149,0,.3);}
#her-alert p{font-size:11px;font-family:'IBM Plex Mono',monospace;color:#ff9500;}
#her-alert button{margin-top:6px;font-size:9px;font-family:'IBM Plex Mono',monospace;padding:3px 10px;border:1px solid #ff9500;background:transparent;color:#ff9500;border-radius:4px;cursor:pointer;}
#bezoek-popup{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);background:#161b22;border:1px solid #3fb950;border-radius:10px;padding:12px 16px;z-index:2000;display:none;min-width:250px;text-align:center;box-shadow:0 4px 20px rgba(63,185,80,.3);}

#rapport{position:absolute;inset:0;background:#0d1117;z-index:2800;display:none;flex-direction:column;}
#rapport-header{background:#161b22;border-bottom:1px solid #21262d;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}

#fp h3{font-size:11px;color:#58a6ff;font-family:'IBM Plex Mono',monospace;margin-bottom:12px;}
.fr{display:flex;align-items:center;gap:9px;margin-bottom:10px;cursor:pointer;}
.fr:last-child{margin-bottom:0;}
.fr label{font-size:12px;cursor:pointer;color:#ccc;}

#dp{position:absolute;bottom:54px;left:10px;background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px;z-index:1000;display:none;width:250px;box-shadow:0 8px 32px rgba(0,0,0,.8);}
.dpc{position:absolute;top:8px;right:10px;background:none;border:none;color:#6e7681;cursor:pointer;font-size:20px;padding:2px 6px;}
.dn{font-weight:600;font-size:13px;margin-bottom:4px;line-height:1.3;}
.da{font-size:11px;color:#8b949e;font-family:'IBM Plex Mono',monospace;margin-bottom:4px;line-height:1.5;}
.dd{font-size:10px;color:#6e7681;font-family:'IBM Plex Mono',monospace;margin-bottom:8px;}
.dho{font-size:10px;color:#ff9500;font-family:'IBM Plex Mono',monospace;margin-bottom:8px;}
.ds{font-size:11px;color:#adbac7;margin-bottom:8px;line-height:1.4;}
.badge{display:inline-block;font-size:10px;font-family:'IBM Plex Mono',monospace;padding:4px 10px;border-radius:4px;font-weight:600;margin-bottom:8px;}
.br{background:#3d1a1a;color:#f85149;border:1px solid #f85149;}
.bgg{background:#1a3d1f;color:#3fb950;border:1px solid #3fb950;}
.bo{background:#3d2a0a;color:#ff9500;border:1px solid #ff9500;}
.bw{background:#21262d;color:#8b949e;border:1px solid #484f58;}
.bth{background:#2d1f4d;color:#a78bfa;border:1px solid #a78bfa;}
.bka{background:#0c2a3d;color:#38bdf8;border:1px solid #38bdf8;}
.bnt{background:#3d1f0a;color:#f97316;border:1px solid #f97316;}
.bvj{background:#3d3000;color:#eab308;border:1px solid #eab308;}
.opm{font-size:11px;color:#fbbf24;font-family:'IBM Plex Mono',monospace;margin-bottom:8px;background:#2d1f0a;border:1px solid #f97316;border-radius:5px;padding:4px 8px;}
.oppas{font-size:12px;font-weight:600;color:#fff;font-family:'IBM Plex Mono',monospace;margin-bottom:10px;background:#7f1d1d;border:2px solid #ef4444;border-radius:6px;padding:8px 10px;text-align:center;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.7;}}
.dnav{display:block;width:100%;margin-top:4px;padding:8px;font-size:11px;font-family:'IBM Plex Mono',monospace;background:#21262d;border:1px solid #30363d;color:#e6edf3;border-radius:5px;cursor:pointer;text-align:center;}
.dnav:active,.dnav:hover{background:#1a3a5c;border-color:#58a6ff;color:#58a6ff;}
.leaflet-control-zoom a{background:#161b22!important;color:#e6edf3!important;border-color:#30363d!important;}
.leaflet-pane.leaflet-marker-pane{z-index:650!important;}
.leaflet-div-icon{background:transparent!important;border:none!important;}

<body>

<div id="loading"><div class="spinner"></div><h2>ERFCONTROLE KAART</h2><div id="loadmsg">Gegevens ophalen...</div><div id="loadbar-bg"><div id="loadbar-fill"></div></div></div>
<div id="alert"><h3>🚨 CONTROLE IN DE BUURT!</h3><p id="alert-text"></p><button id="alert-nav" onclick="navToAlert()">🗺 Navigeer hierheen</button><button id="alert-close" onclick="closeAlert()">Doorgaan</button></div>
<div id="her-alert"><p id="her-alert-text"></p><button onclick="document.getElementById('her-alert').style.display='none'">Sluiten</button></div>

<div id="fp">
  <h3>🔍 FILTER</h3>
  <div class="fr"><input type="checkbox" id="fR" checked onchange="render()"><label for="fR">🔴 Nog te controleren</label></div>

  <div class="fr"><input type="checkbox" id="fTH" checked onchange="render()"><label for="fTH">🏠 Thuis</label></div>

  <button class="btn" onclick="zoomAll()">🗺 Overzicht</button>
  <button class="btn" onclick="zoomTodo()">🔴 Te doen</button>
  <button class="btn" onclick="toonRapport()">📋 Rapport</button>
  <button class="btn" onclick="syncSheets()">🔄 Ververs</button>

<script>
// ═══════════════════════════════════
//  CONFIG
// ═══════════════════════════════════
const CSV_URL       = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQq3URzL5qqMcbj0YLmhXxbT6tlMSW_NBIbEvERhtZMi_Fuxd6JBohNO0lqIuZPgr65AiViZ_qqxEod/pub?output=csv';
const GEO_CACHE_KEY = 'erfcontrole_geocache_v4';
const LOG_KEY       = 'erfcontrole_daglog_v2';
const PROX_ALERT    = 200;
const PROX_BEZOEK   = 80;
const STILSTAND_MS  = 15000;

// ═══════════════════════════════════
//  KAART
// ═══════════════════════════════════
const map = L.map('map', {
  zoomControl: true, tap: true, tapTolerance: 15,
  touchZoom: true, bounceAtZoomLimits: false
}).setView([53.08, 6.37], 13);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
  {attribution:'© OpenStreetMap © CARTO', subdomains:'abcd', maxZoom:19}).addTo(map);

// Noordpijl
const noordpijl = L.control({position:'topright'});
noordpijl.onAdd = function(){
  const div = L.DomUtil.create('div','noordpijl');
  div.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36">
    <circle cx="18" cy="18" r="17" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <polygon points="18,4 22,18 18,15 14,18" fill="#f85149"/>
    <polygon points="18,32 22,18 18,21 14,18" fill="#e6edf3" opacity=".7"/>
    <text x="18" y="11" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-size="7" font-weight="bold" fill="#f85149">N</text>
  </svg>`;
  div.style.cssText='background:transparent;border:none;cursor:default;margin:8px;';
  L.DomEvent.disableClickPropagation(div);
  return div;
};
noordpijl.addTo(map);

map.createPane('markers');
map.getPane('markers').style.zIndex = 650;
map.getPane('markers').style.pointerEvents = 'auto';

let LOCS=[], markers=[], selId=null;
let carMarker=null, gpsOn=false, gpsWatcher=null;
let myLat=null, myLon=null, myHeading=0, mySpeed=0;
let wakeLock=null;
let ritStart=null, ritKm=0, ritSpeeds=[], ritTimer=null, prevLat=null, prevLon=null;
let huidigBezoek=null, stilstandTimer=null, stilstandLoc=null;
let lastAlertTime=0, alertLoc=null, lastHerAlertTime=0;
let herAlertGetoond=new Set(), alertGetoond=new Set();

// ═══════════════════════════════════
//  CSV PARSING
// ═══════════════════════════════════
function parseCSVRow(line) {
  const r=[];let c='',q=false;
  for(const ch of line){if(ch==='"'){q=!q;}else if(ch===','&&!q){r.push(c.trim());c='';}else c+=ch;}
  r.push(c.trim());return r;
}

function parseStatus(v) {
  if(!v||v==='')return'todo';
  const s=v.trim().toLowerCase().replace(/[^a-z]/g,'');
  if(s==='nogtecontroleren'||s==='tegaan'||s==='tedoen')return'todo';
  if(s==='goed'||s==='gecontroleerd'||s==='ok')return'goed';
  if(s==='fout'||s==='afgekeurd')return'fout';
  if(s==='hercontrole'||s==='her'||s==='herkeuring')return'her';
  if(s==='gestopt'||s==='gestorpt'||s==='geenhouder'||s==='vervallen')return'gestopt';
  if(s==='thuis')return'thuis';
  if(s==='kantoor')return'kantoor';
  // Vorig jaar gedaan — check VOOR niet thuis want beide bevatten letters die overlappen
  if(s==='vorigjaargedaan'||s==='vorigjaar'||s==='nietditjaar'||s==='overslaan'||s.includes('vorigjaar')||s.includes('vorig'))return'vorigjaar';
  // Niet thuis — check op combinatie niet+thuis
  if(s==='nietthuis'||s==='nthuis'||(s.includes('niet')&&s.includes('thuis')))return'nietthuis';
  return'todo';
}

// ═══════════════════════════════════
//  GOOGLE SHEETS LADEN
// ═══════════════════════════════════
async function loadFromSheet() {
  const resp = await fetch(CSV_URL+'&t='+Date.now());
  if(!resp.ok) throw new Error('HTTP '+resp.status);
  const txt = await resp.text();
  if(txt.trim().toLowerCase().startsWith('<!')) throw new Error('Geen CSV — check publicatie');
  const lines = txt.trim().split(/\r?\n/);
  const first = parseCSVRow(lines[0]);
  const firstLow = first.map(h=>h.toLowerCase().trim());
  const heeftHeader = firstLow.some(h=>h.includes('naam')||h.includes('status')||h.includes('straat'));
  const startRij = heeftHeader?1:0;
  let iNaam=0,iDatum=1,iStraat=2,iNr=3,iPostcode=4,iPlaats=5,iStatus=6,iHerDatum=7,iOpmerking=8,iNietThuisDatum=9,iOppassen=10;
  if(heeftHeader){
    iNaam     =firstLow.findIndex(h=>h.includes('naam'))??0;
    iDatum    =firstLow.findIndex(h=>(h.includes('datum')||h.includes('date'))&&!h.includes('her'))??1;
    iStraat   =firstLow.findIndex(h=>h.includes('straat')||h.includes('adres'))??2;
    iNr       =firstLow.findIndex(h=>h==='nr'||h.includes('huisnr')||h.includes('nummer'))??3;
    iPostcode =firstLow.findIndex(h=>h.includes('postcode'))??4;
    iPlaats   =firstLow.findIndex(h=>h.includes('plaats')||h.includes('woon'))??5;
    iStatus   =firstLow.findIndex(h=>h.includes('status'))??6;
    iHerDatum  =firstLow.findIndex(h=>h.includes('hercontrole')||h.includes('herdatum')||(h.includes('her')&&h.includes('datum')));
    iOpmerking     =firstLow.findIndex(h=>h.includes('opmerking')||h.includes('notitie')||h.includes('note')||h.includes('remark'));
    iNietThuisDatum=firstLow.findIndex(h=>h.includes('lgw')||h.includes('langs')||h.includes('geweest')||(h.includes('niet')&&h.includes('thuis')));
  }
  const locs=[];
  for(let i=startRij;i<lines.length;i++){
    if(!lines[i].trim())continue;
    const row=parseCSVRow(lines[i]);
    const naam=(row[iNaam]||'').trim();
    if(!naam)continue;
    locs.push({
      id:i, naam,
      straat:(row[iStraat]||'').trim(),
      nr:(row[iNr]||'').trim(),
      postcode:(row[iPostcode]||'').trim().replace(/\s/g,''),
      plaats:(row[iPlaats]||'').trim(),
      datum:(row[iDatum]||'').trim(),
      herDatum:iHerDatum>=0?(row[iHerDatum]||'').trim():'',
      opmerking:iOpmerking>=0?(row[iOpmerking]||'').trim():'',
      nietThuisDatum:iNietThuisDatum>=0?(row[iNietThuisDatum]||'').trim():'',
      oppassen:iOppassen>=0?['ja','yes','1','waar','true'].includes(String(row[iOppassen]||'').trim().toLowerCase()):false,
      status:parseStatus(row[iStatus]||''),
      adresQ:`${(row[iStraat]||'').trim()} ${(row[iNr]||'').trim()}, ${(row[iPostcode]||'').trim()} ${(row[iPlaats]||'').trim()}, Nederland`,
      lat:null, lon:null
    });
  }
  return locs;
}

const sleep = ms=>new Promise(r=>setTimeout(r,ms));
function loadGeoCache(){try{return JSON.parse(localStorage.getItem(GEO_CACHE_KEY)||'{}');}catch(e){return{};}}
function saveGeoCache(c){try{localStorage.setItem(GEO_CACHE_KEY,JSON.stringify(c));}catch(e){}}

async function geocodeOne(q) {
  const url=`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1&countrycodes=nl`;
  try{const r=await fetch(url);if(!r.ok)return null;const d=await r.json();if(d&&d[0])return{lat:parseFloat(d[0].lat),lon:parseFloat(d[0].lon)};}catch(e){}
  return null;
}

async function geocodeAll(locs) {
  const cache=loadGeoCache();let nieuw=0;
  for(let i=0;i<locs.length;i++){
    const loc=locs[i];
    const key=loc.adresQ.toLowerCase().replace(/\s/g,'');
    if(cache[key]){loc.lat=cache[key].lat;loc.lon=cache[key].lon;continue;}
    document.getElementById('loadmsg').textContent=`Adres ${i+1}/${locs.length}: ${loc.naam.substring(0,25)}...`;
    document.getElementById('loadbar-fill').style.width=((i+1)/locs.length*100)+'%';
    let res=await geocodeOne(loc.adresQ);
    if(!res)res=await geocodeOne(`${loc.postcode} ${loc.plaats}, Nederland`);
    if(res){loc.lat=res.lat;loc.lon=res.lon;cache[key]=res;nieuw++;await sleep(1100);}
  }
  if(nieuw>0)saveGeoCache(cache);
  return locs;
}

function berekenAfstand(la1,lo1,la2,lo2){
  const R=6371000,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function startRit(){ritStart=Date.now();ritKm=0;ritSpeeds=[];prevLat=null;prevLon=null;document.getElementById('ritbar').style.display='block';ritTimer=setInterval(updateRitBar,1000);}
function stopRit(){if(ritTimer)clearInterval(ritTimer);document.getElementById('ritbar').style.display='none';}
function updateRitBar(){
  if(!ritStart)return;
  const e=Math.floor((Date.now()-ritStart)/1000);
  document.getElementById('rit-tijd').textContent=`${Math.floor(e/60).toString().padStart(2,'0')}:${(e%60).toString().padStart(2,'0')}`;
  document.getElementById('rit-km').textContent=ritKm.toFixed(1);
  const avg=ritSpeeds.length?Math.round(ritSpeeds.reduce((a,b)=>a+b,0)/ritSpeeds.length*3.6):0;
  document.getElementById('rit-snelheid').textContent=avg;
  const v=getDagLog().filter(x=>isVandaag(x.aankomst)).length;
  document.getElementById('vandaag-badge').textContent=`✓ ${v} vandaag`;
}

function getDagLog(){try{return JSON.parse(localStorage.getItem(LOG_KEY)||'[]');}catch(e){return[];}}
function saveDagLog(l){try{localStorage.setItem(LOG_KEY,JSON.stringify(l));}catch(e){}}
function isVandaag(ts){const d=new Date(ts),n=new Date();return d.getDate()===n.getDate()&&d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();}
function startBezoek(loc){
  if(huidigBezoek&&huidigBezoek.loc.id===loc.id)return;
  if(huidigBezoek)sluitBezoek();
  const aankomst=Date.now();huidigBezoek={loc,aankomst,timerInterval:null};
  document.getElementById('bezoek-naam').textContent=loc.naam;
  document.getElementById('bezoek-tijd').textContent=`Aankomst: ${new Date(aankomst).toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})}`;
  document.getElementById('bezoek-popup').style.display='block';
  huidigBezoek.timerInterval=setInterval(()=>{
    const el=Math.floor((Date.now()-aankomst)/1000);
    document.getElementById('bezoek-timer').textContent=`${Math.floor(el/60).toString().padStart(2,'0')}:${(el%60).toString().padStart(2,'0')}`;
  },1000);
}
function sluitBezoek(){
  if(!huidigBezoek)return;
  const vertrek=Date.now(),duurSec=Math.floor((vertrek-huidigBezoek.aankomst)/1000);
  if(huidigBezoek.timerInterval)clearInterval(huidigBezoek.timerInterval);
  document.getElementById('bezoek-popup').style.display='none';
  if(duurSec>=30){const log=getDagLog();log.push({id:huidigBezoek.loc.id,naam:huidigBezoek.loc.naam,adres:`${huidigBezoek.loc.straat} ${huidigBezoek.loc.nr}, ${huidigBezoek.loc.plaats}`,status:huidigBezoek.loc.status,aankomst:huidigBezoek.aankomst,vertrek,duurSec});saveDagLog(log);}
  huidigBezoek=null;updateRitBar();
}

async function requestWakeLock(){try{if('wakeLock' in navigator){wakeLock=await navigator.wakeLock.request('screen');document.getElementById('wakelock-badge').style.display='block';wakeLock.addEventListener('release',()=>document.getElementById('wakelock-badge').style.display='none');}}catch(e){}}
function releaseWakeLock(){if(wakeLock){wakeLock.release();wakeLock=null;}document.getElementById('wakelock-badge').style.display='none';}
document.addEventListener('visibilitychange',async()=>{if(wakeLock!==null&&document.visibilityState==='visible'&&gpsOn)await requestWakeLock();});

function toggleGPS(){gpsOn?stopGPS():startGPS();}
async function startGPS(){
  if(!navigator.geolocation){alert('GPS niet beschikbaar.');return;}
  await requestWakeLock();startRit();
  gpsWatcher=navigator.geolocation.watchPosition(pos=>{
    const{latitude:la,longitude:lo,heading:hd,speed:sp}=pos.coords;
    const hdg=(hd!=null&&!isNaN(hd))?hd:myHeading;
    mySpeed=sp||0;if(mySpeed>0.5)ritSpeeds.push(mySpeed);
    if(prevLat!==null){const d=berekenAfstand(prevLat,prevLon,la,lo);if(d<500)ritKm+=d/1000;}
    prevLat=la;prevLon=lo;myLat=la;myLon=lo;myHeading=hdg;
    const icon=L.divIcon({html:carSVG(hdg),iconSize:[38,38],iconAnchor:[19,19],className:''});
    if(carMarker){
      carMarker.setLatLng([la,lo]);carMarker.setIcon(icon);
      // Auto altijd gecentreerd houden tijdens rijden
      map.panTo([la,lo],{animate:true,duration:0.5,easeLinearity:0.5});
    }
    else{carMarker=L.marker([la,lo],{icon,zIndexOffset:3000,interactive:false,pane:'markers'}).addTo(map);map.setView([la,lo],15);}
    checkNearby(la,lo);checkBezoek(la,lo);
  },e=>console.warn('GPS:',e),{enableHighAccuracy:true,maximumAge:2000,timeout:10000});
  gpsOn=true;document.getElementById('bgps').classList.add('on');document.getElementById('bgps').textContent='🚗 Rijden aan';
}
function stopGPS(){
  if(gpsWatcher)navigator.geolocation.clearWatch(gpsWatcher);
  if(carMarker){map.removeLayer(carMarker);carMarker=null;}
  sluitBezoek();stopRit();releaseWakeLock();
  gpsOn=false;document.getElementById('bgps').classList.remove('on');document.getElementById('bgps').textContent='🚗 Rijden';
}

function checkNearby(la,lo){
  if(Date.now()-lastAlertTime>25000){
    const todo=LOCS.filter(l=>st(l)==='todo'&&l.lat&&l.lon);
    let best=null,minD=Infinity;
    todo.forEach(l=>{const d=berekenAfstand(la,lo,l.lat,l.lon);if(d<minD){minD=d;best=l;}});
    if(best&&minD<=PROX_ALERT&&!alertGetoond.has(best.id)){
      lastAlertTime=Date.now();alertLoc=best;alertGetoond.add(best.id);
      document.getElementById('alert-text').innerHTML=`<strong>${best.naam}</strong><br>${best.straat} ${best.nr}, ${best.plaats}<br><br>📏 <strong>${Math.round(minD)}m</strong>`;
      document.getElementById('alert').style.display='block';
      map.setView([best.lat,best.lon],17,{animate:true});
    }
  }
  if(Date.now()-lastHerAlertTime>30000){
    const her=LOCS.filter(l=>(st(l)==='her'||st(l)==='fout')&&l.lat&&l.lon);
    let best=null,minD=Infinity;
    her.forEach(l=>{const d=berekenAfstand(la,lo,l.lat,l.lon);if(d<minD){minD=d;best=l;}});
    if(best&&minD<=PROX_ALERT&&!herAlertGetoond.has(best.id)){
      lastHerAlertTime=Date.now();herAlertGetoond.add(best.id);
      document.getElementById('her-alert-text').textContent=`⚠️ Hercontrole: ${best.naam} — ${Math.round(minD)}m`;
      document.getElementById('her-alert').style.display='block';
      setTimeout(()=>document.getElementById('her-alert').style.display='none',8000);
    }
  }
}
function checkBezoek(la,lo){
  const dichtste=LOCS.filter(l=>l.lat&&l.lon).reduce((best,l)=>{const d=berekenAfstand(la,lo,l.lat,l.lon);return(!best||d<best.d)?{l,d}:best;},null);
  if(!dichtste||dichtste.d>PROX_BEZOEK){
    if(stilstandTimer){clearTimeout(stilstandTimer);stilstandTimer=null;stilstandLoc=null;}
    if(huidigBezoek&&berekenAfstand(la,lo,huidigBezoek.loc.lat,huidigBezoek.loc.lon)>150)sluitBezoek();
    return;
  }
  const loc=dichtste.l;
  if(stilstandLoc?.id!==loc.id){
    if(stilstandTimer)clearTimeout(stilstandTimer);
    stilstandLoc=loc;
    stilstandTimer=setTimeout(()=>{if(mySpeed<2)startBezoek(loc);},STILSTAND_MS);
  }
}

  document.getElementById('rapport-datum').textContent=new Date().toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long'});
  const body=document.getElementById('rapport-body');body.innerHTML='';
  if(log.length===0){body.innerHTML='<p style="color:#6e7681;font-size:12px;text-align:center;margin-top:30px;">Nog geen bezoeken vandaag.</p>';}
  else{log.forEach(v=>{
    const aan=new Date(v.aankomst).toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
    const vert=new Date(v.vertrek).toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
    const dm=Math.floor(v.duurSec/60),ds=v.duurSec%60;
    const sc={todo:'br',goed:'bgg',fout:'bo',her:'bo',gestopt:'bw'}[v.status||'todo'];
    const sl={todo:'Te doen',goed:'Goed ✓',fout:'Fout',her:'Hercontrole',gestopt:'Gestopt'}[v.status||'todo'];
    body.innerHTML+=`<div class="rapport-item"><div class="rapport-naam">${v.naam}</div><div class="rapport-meta">📍 ${v.adres}<br>🕐 ${aan} → ${vert} &nbsp;⏱ ${dm>0?`${dm}m ${ds}s`:`${ds}s`}</div><span class="rapport-status badge ${sc}">${sl}</span></div>`;
  });}
  const tot=log.reduce((s,v)=>s+v.duurSec,0);
  document.getElementById('rs-n').textContent=log.length;
  document.getElementById('rs-tijd').textContent=Math.floor(tot/60)>0?`${Math.floor(tot/60)} min`:`${tot}s`;
  document.getElementById('rs-km').textContent=ritKm.toFixed(1)+' km';
  document.getElementById('rapport').style.display='flex';
}
function sluitRapport(){document.getElementById('rapport').style.display='none';}

// ═══════════════════════════════════
//  OVERIGE FUNCTIES
// ═══════════════════════════════════
function toggleFp(){const p=document.getElementById('fp'),open=p.style.display==='block';p.style.display=open?'none':'block';document.getElementById('bfp').classList.toggle('on',!open);if(!open)document.getElementById('dp').style.display='none';}
function zoomAll(){const v=LOCS.filter(l=>l.lat&&l.lon);if(v.length)map.fitBounds(L.latLngBounds(v.map(l=>[l.lat,l.lon])),{padding:[30,30]});}
function zoomTodo(){const v=LOCS.filter(l=>st(l)==='todo'&&l.lat&&l.lon);if(v.length)map.fitBounds(L.latLngBounds(v.map(l=>[l.lat,l.lon])),{padding:[40,40]});}
map.on('click',()=>closeDp());

// ═══════════════════════════════════
//  OPSTARTEN & REFRESH
// ═══════════════════════════════════
async function refreshAll(){
  document.getElementById('loading').style.display='flex';
  document.getElementById('loadmsg').textContent='Gegevens ophalen uit Google Sheets...';
  document.getElementById('loadbar-fill').style.width='0%';
  try{
    const raw=await loadFromSheet();
    LOCS=await geocodeAll(raw);
    // Zorg dat herDatum altijd van raw data komt
    LOCS.forEach(loc=>{const r=raw.find(r=>r.naam===loc.naam);if(r){loc.herDatum=r.herDatum;loc.datum=r.datum;loc.status=r.status;loc.opmerking=r.opmerking;loc.nietThuisDatum=r.nietThuisDatum;loc.oppassen=r.oppassen;}});
    document.getElementById('loading').style.display='none';
    document.getElementById('syncbadge').textContent=`🕐 ${new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})} · ${LOCS.length} bedrijven`;
    render();zoomAll();
  }catch(e){
    console.error(e);
    document.getElementById('loadmsg').textContent='⚠ '+e.message;
    document.getElementById('loading').style.display='none';
    render();
  }
}

async function syncSheets(){
  try{
    const raw=await loadFromSheet();
    raw.forEach(r=>{const ex=LOCS.find(l=>l.naam===r.naam);if(ex){ex.status=r.status;ex.datum=r.datum;ex.herDatum=r.herDatum;ex.opmerking=r.opmerking;ex.nietThuisDatum=r.nietThuisDatum;ex.oppassen=r.oppassen;}});
    const nieuw=raw.filter(r=>!LOCS.find(l=>l.naam===r.naam));
    if(nieuw.length>0){const g=await geocodeAll(nieuw);LOCS=[...LOCS,...g];}
    alertGetoond.clear();herAlertGetoond.clear();
    document.getElementById('syncbadge').textContent=`🕐 ${new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})}`;
    render();
  }catch(e){console.warn('Sync:',e);}
}

refreshAll();
// Auto-refresh elke 30 minuten
setInterval(async()=>{
  await syncSheets();
  document.getElementById('syncbadge').textContent=`🕐 ${new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})} (auto)`;
}, 30*60*1000);
</script>
