  {naam:"Huistra, S.",                                    q:"Zandumerweg 52, Oldekerk, Groningen",        src:"Veeteelt", soort:"Veehouderij"},

  {naam:"Mts. Wielsma-de Vries",                          q:"Zandumerweg 23, Oldekerk, Groningen",        src:"Veeteelt", soort:"Fokken en houden van paarden"},
  // SEBALDEBUREN
  {naam:"J. van Luit en K.R. Bakker",                    q:"Buikstede 5, Sebaldeburen, Groningen",       src:"Veeteelt", soort:"Houden van melkvee"},
  {naam:"Melkveebedrijf Horenga",                         q:"Provincialeweg 6, Sebaldeburen, Groningen",  src:"Veeteelt", soort:"Houden van melkvee"},
  {naam:"Schapenhouderij Pama",                           q:"Provincialeweg 91, Sebaldeburen, Groningen", src:"Veeteelt", soort:"Fokken en houden van schapen"},
  {naam:"Westerhof Sebaldeburen",                         q:"Provincialeweg 36, Sebaldeburen, Groningen", src:"Veeteelt", soort:"Veehouderij"},
  {naam:"Maatsch. A. de Kreij en J.F. de Kreij-Folkers",  q:"Provincialeweg 1, Sebaldeburen, Groningen",  src:"Veeteelt", soort:"Houden van melkvee"},
  {naam:"A.H. Arkies",                                    q:"Westerzand 7, Sebaldeburen, Groningen",      src:"Veeteelt", soort:"Houden van melkvee"},
  {naam:"F.J. Couperus",                                  q:"Westerzand 2, Sebaldeburen, Groningen",      src:"Veeteelt", soort:"Fokken en houden van schapen"},
  {naam:"Huisma",                                         q:"Westerzand 24, Sebaldeburen, Groningen",     src:"Veeteelt", soort:"Overige vleesveehouderij"},
  {naam:"Vleesveehouderij P. Huisma",                     q:"Westerzand 26, Sebaldeburen, Groningen",     src:"Veeteelt", soort:"Overige vleesveehouderij"},
  {naam:"F. Venema",                                      q:"Westerzand 1, Sebaldeburen, Groningen",      src:"Veeteelt", soort:"Houden van melkvee"},
  {naam:"Melkveehouderijbedrijf Bouwkamp",                q:"Westerzand 18, Sebaldeburen, Groningen",     src:"Veeteelt", soort:"Houden van melkvee"},

let LOCS=ADRESSEN.map((a,i)=>({...a,id:i+1,lat:null,lon:null,status:'todo'}));

const map=L.map('map',{zoomControl:true,tap:true}).setView([53.08,6.37],13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  attribution:'© OpenStreetMap © CARTO',subdomains:'abcd',maxZoom:19
}).addTo(map);

let markers=[],selId=null,carMarker=null,gpsOn=false,gpsWatcher=null;
let myLat=null,myLon=null,myHeading=0,lastAlertTime=0,alertLoc=null,debugVisible=false;

const sleep=ms=>new Promise(r=>setTimeout(r,ms));

async function geocodeOne(q){
  const url=`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1&countrycodes=nl`;
  const r=await fetch(url,{headers:{'User-Agent':'WaterschapNZ-ErfControle/4.0'}});
  const d=await r.json();
  return d&&d[0]?{lat:parseFloat(d[0].lat),lon:parseFloat(d[0].lon)}:null;
}

async function geocodeAll(){
  const n=LOCS.length;
  for(let i=0;i<n;i++){
    const loc=LOCS[i];
    document.getElementById('loadmsg').textContent=`Adres ${i+1}/${n}: ${loc.naam.substring(0,28)}...`;
    document.getElementById('loadbar-fill').style.width=((i+1)/n*100)+'%';
    try{
      let res=await geocodeOne(loc.q);
      if(!res){const k=loc.q.replace(/^\S+\s+\d+\w*,\s*/,'');res=await geocodeOne(k);}
      if(res){loc.lat=res.lat;loc.lon=res.lon;}
    }catch(e){console.warn('geocode:',loc.naam,e);}
    await sleep(1100);
  }
}

function parseCSVRow(line){
  const r=[];let c='',q=false;
  for(const ch of line){if(ch==='"'){q=!q;}else if(ch===','&&!q){r.push(c.trim());c='';}else c+=ch;}
  r.push(c.trim());return r;
}

function parseStatus(v){
  if(!v||v==='')return'todo';
  const s=v.trim().toLowerCase().replace(/[^a-z]/g,'');
  if(s==='goed'||s==='gecontroleerd'||s==='ok')return'goed';
  if(s==='fout'||s==='afgekeurd')return'fout';
  if(s==='hercontrole'||s==='her'||s==='herkeuring')return'her';
  if(s==='gestopt'||s==='gestorpt'||s==='geenhouder'||s==='vervallen')return'gestopt';
  return'todo'; // "Nog te doen" en leeg → rood
}

// Robuuste naam-normalisatie: verwijder alle niet-letters/cijfers
const normN=n=>(n||'').toLowerCase().replace(/[^a-z0-9]/g,'');

async function syncSheets(){
  document.getElementById('syncbadge').textContent='🔄 laden...';
  let dbg='';
  try{
    const resp=await fetch(CSV_URL+'&t='+Date.now(),{cache:'no-cache'});
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const txt=await resp.text();
    if(txt.trim().toLowerCase().startsWith('<!'))throw new Error('Geen CSV — check publicatie');
    const lines=txt.trim().split(/\r?\n/);
    const hdr=parseCSVRow(lines[0]);
    const hdrLow=hdr.map(h=>h.toLowerCase().trim());

    // Detecteer of rij 0 een echte headerrij is of al data bevat
    // Als de eerste kolom GEEN "naam" bevat maar WEL een bedrijfsnaam, dan is er geen headerrij
    const heeftHeader = hdrLow.some(h=>h.includes('naam')||h.includes('status')||h.includes('straat'));
    const startRij = heeftHeader ? 1 : 0;

    const iStatus = heeftHeader ? hdrLow.findIndex(h=>h.includes('status')) : -1;
    // Als geen header: status staat in laatste kolom
    const iStat = iStatus>=0 ? iStatus : hdr.length-1;

    dbg+=`Header gevonden: ${heeftHeader} → data start op rij ${startRij}\n`;
    dbg+=`Kolommen: ${hdr.join(' | ')}\nStatus=kolom ${iStat}\n\nEERSTE 5:\n`;
    const sm={};
    for(let i=startRij;i<lines.length;i++){
      if(!lines[i].trim())continue;
      const row=parseCSVRow(lines[i]);
      const naamRaw=(row[0]||'').trim();
      const statusRaw=(row[iStat]||'').trim();
      const naam=normN(naamRaw);
      if(!naam)continue;
      sm[naam]={raw:statusRaw,status:parseStatus(statusRaw)};
      if(i<=startRij+4)dbg+=`  [${i}] "${naamRaw}" → "${statusRaw}" → ${parseStatus(statusRaw)}\n`;
    }
    dbg+=`\nSHEET: ${Object.keys(sm).length} rijen\n\nKOPPELING:\n`;
    let matched=0;
    LOCS.forEach(loc=>{
      const k=normN(loc.naam);
      // 1. Exacte match
      let hit=sm[k];
      // 2. Alt-sleutelwoord match (voor lastige namen)
      if(!hit&&loc.alt){
        const pk=Object.keys(sm).find(s=>s.includes(loc.alt));
        if(pk)hit=sm[pk];
      }
      // 3. Gedeeltelijke match op 8 tekens
      if(!hit){
        const pk=Object.keys(sm).find(s=>s.startsWith(k.slice(0,8))||k.startsWith(s.slice(0,8)));
        if(pk)hit=sm[pk];
      }
      if(hit){
        loc.status=hit.status;matched++;
        dbg+=`✓ "${loc.naam.substring(0,25)}" → ${hit.raw} → ${hit.status}\n`;
      } else {
        dbg+=`✗ "${loc.naam.substring(0,25)}" → NIET GEVONDEN\n`;
      }
    });
    document.getElementById('debugbox').textContent=dbg;
    document.getElementById('syncbadge').textContent=
      `🕐 ${new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'})} · ${matched}/${LOCS.length} ✓`;
  }catch(e){
    dbg+=`\n❌ FOUT: ${e.message}`;
    document.getElementById('debugbox').textContent=dbg;
    document.getElementById('syncbadge').textContent='⚠ '+e.message.substring(0,20);
    console.error('Sync fout:',e);
  }
  render();
}

const st=l=>l.status||'todo';
const COL={todo:'#f85149',goed:'#3fb950',fout:'#ff9500',her:'#ff9500',gestopt:'#6e7681'};
const LBL={todo:'NOG TE CONTROLEREN',goed:'GECONTROLEERD ✓',fout:'FOUT',her:'HERCONTROLE',gestopt:'GESTOPT'};
const BCLS={todo:'br',goed:'bgg',fout:'bo',her:'bo',gestopt:'bw'};

function mkIcon(status,sz){
  const c=COL[status]||COL.todo,h=sz+10;
  let inn='';
  if(status==='goed') inn=`<path d="M${sz/2-6} ${sz*.56}l5 5 7-7" stroke="${c}" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;
  else if(status==='fout'||status==='her') inn=`<text x="${sz/2}" y="${sz*.63}" text-anchor="middle" font-size="13" font-weight="bold" fill="${c}">!</text>`;
  else if(status==='gestopt') inn=`<line x1="${sz/2-5}" y1="${sz*.5}" x2="${sz/2+5}" y2="${sz*.6}" stroke="${c}" stroke-width="2.5"/><line x1="${sz/2+5}" y1="${sz*.5}" x2="${sz/2-5}" y2="${sz*.6}" stroke="${c}" stroke-width="2.5"/>`;
  else inn=`<circle cx="${sz/2}" cy="${sz*.54}" r="4.5" fill="${c}"/>`;
  return L.divIcon({
    html:`<svg xmlns="http://www.w3.org/2000/svg" width="${sz}" height="${h}" viewBox="0 0 ${sz} ${h}">
      <path d="M${sz/2} 0C${sz*.15} 0 0 ${sz*.36} 0 ${sz*.52}c0 ${sz*.4} ${sz/2} ${sz*.48} ${sz/2} ${sz*.48}S${sz} ${sz*.92} ${sz} ${sz*.52}C${sz} ${sz*.36} ${sz*.85} 0 ${sz/2} 0z" fill="${c}" opacity=".92"/>
      <circle cx="${sz/2}" cy="${sz*.52}" r="${sz*.28}" fill="white" opacity=".95"/>
      ${inn}</svg>`,
    iconSize:[sz,h],iconAnchor:[sz/2,h],popupAnchor:[0,-(h+2)],className:''
  });
}

function render(){
  markers.forEach(m=>map.removeLayer(m));markers=[];
  const fR=document.getElementById('fR').checked,fG=document.getElementById('fG').checked;
  const fO=document.getElementById('fO').checked,fW=document.getElementById('fW').checked;
  LOCS.forEach(loc=>{
    if(!loc.lat||!loc.lon)return;
    const s=st(loc);
    if(s==='todo'&&!fR||s==='goed'&&!fG||(s==='fout'||s==='her')&&!fO||s==='gestopt'&&!fW)return;
    const sz=loc.id===selId?36:28;
    const m=L.marker([loc.lat,loc.lon],{icon:mkIcon(s,sz)}).addTo(map);
    m.on('click',()=>showDp(loc.id));
    markers.push(m);
  });
  document.getElementById('cr').textContent=LOCS.filter(l=>st(l)==='todo').length;
  document.getElementById('cg').textContent=LOCS.filter(l=>st(l)==='goed').length;
  document.getElementById('co').textContent=LOCS.filter(l=>st(l)==='fout'||st(l)==='her').length;
  document.getElementById('cw').textContent=LOCS.filter(l=>st(l)==='gestopt').length;
  const n=LOCS.filter(l=>st(l)==='goed').length,p=Math.min(100,Math.round(n/TOTAAL*100));
  document.getElementById('pfill').style.width=p+'%';
  document.getElementById('plbl').textContent=`${n} / ${TOTAAL} (${p}%)`;
}

function showDp(id){
  const l=LOCS.find(x=>x.id===id);if(!l)return;
  selId=id;render();
  const s=st(l);
  document.getElementById('dpc').innerHTML=`
    <span class="dsrc sv">🐄 ${l.src}</span>
    <div class="dn">${l.naam}</div>
    <div class="da">📍 ${l.q.replace(', Groningen','')}</div>
    ${l.soort?`<div class="ds">${l.soort}</div>`:''}
    <span class="badge ${BCLS[s]}">${LBL[s]}</span>
    <button class="dnav" onclick="navTo(${l.lat},${l.lon})">🗺 Navigeer hierheen</button>`;
  document.getElementById('dp').style.display='block';
  document.getElementById('fp').style.display='none';
}
function closeDp(){selId=null;document.getElementById('dp').style.display='none';render();}
function navTo(lat,lon){window.open(`https://maps.google.com/?daddr=${lat},${lon}`,'_blank');}

function carSVG(hdg){
  return `<svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" viewBox="0 0 34 34" style="transform:rotate(${hdg}deg);transform-origin:center;">
    <circle cx="17" cy="17" r="16" fill="#0d1117" stroke="#58a6ff" stroke-width="2.5"/>
    <polygon points="17,5 22,27 17,23 12,27" fill="white"/></svg>`;
}
function toggleGPS(){gpsOn?stopGPS():startGPS();}
function startGPS(){
  if(!navigator.geolocation){alert('GPS niet beschikbaar.');return;}
  gpsWatcher=navigator.geolocation.watchPosition(pos=>{
    const{latitude:la,longitude:lo,heading:hd}=pos.coords;
    const hdg=(hd!=null&&!isNaN(hd))?hd:myHeading;
    myLat=la;myLon=lo;myHeading=hdg;
    const icon=L.divIcon({html:carSVG(hdg),iconSize:[34,34],iconAnchor:[17,17],className:''});
    if(carMarker){carMarker.setLatLng([la,lo]);carMarker.setIcon(icon);}
    else{carMarker=L.marker([la,lo],{icon,zIndexOffset:3000}).addTo(map);map.setView([la,lo],14);}
    checkNearby(la,lo);
  },e=>console.warn('GPS:',e),{enableHighAccuracy:true,maximumAge:2000,timeout:10000});
  gpsOn=true;
  document.getElementById('bgps').classList.add('on');
  document.getElementById('bgps').textContent='🚗 Rijden aan';
}
function stopGPS(){
  if(gpsWatcher)navigator.geolocation.clearWatch(gpsWatcher);
  if(carMarker){map.removeLayer(carMarker);carMarker=null;}
  gpsOn=false;
  document.getElementById('bgps').classList.remove('on');
  document.getElementById('bgps').textContent='🚗 Rijden';
}

function haversine(la1,lo1,la2,lo2){
  const R=6371000,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function checkNearby(la,lo){
  if(Date.now()-lastAlertTime<20000)return;
  const todo=LOCS.filter(l=>st(l)==='todo'&&l.lat&&l.lon);
  let best=null,minD=Infinity;
  todo.forEach(l=>{const d=haversine(la,lo,l.lat,l.lon);if(d<minD){minD=d;best=l;}});
  if(best&&minD<=PROX_M){
    lastAlertTime=Date.now();alertLoc=best;
    document.getElementById('alert-text').innerHTML=
      `<strong>${best.naam}</strong><br>${best.q.replace(', Groningen','')}<br><br>📏 <strong>${Math.round(minD)} meter</strong>`;
    document.getElementById('alert').style.display='block';
    map.setView([best.lat,best.lon],17,{animate:true});
  }
}
function navToAlert(){if(alertLoc)navTo(alertLoc.lat,alertLoc.lon);}
function closeAlert(){
  document.getElementById('alert').style.display='none';
  if(myLat&&myLon)map.setView([myLat,myLon],15,{animate:true});
}
function toggleFp(){
  const p=document.getElementById('fp'),open=p.style.display==='block';
  p.style.display=open?'none':'block';
  document.getElementById('bfp').classList.toggle('on',!open);
  if(!open)document.getElementById('dp').style.display='none';
}
function toggleDebug(){
  debugVisible=!debugVisible;
  document.getElementById('debugbox').style.display=debugVisible?'block':'none';
}
function zoomAll(){
  const v=LOCS.filter(l=>l.lat&&l.lon);
  if(v.length)map.fitBounds(L.latLngBounds(v.map(l=>[l.lat,l.lon])),{padding:[30,30]});
}
function zoomTodo(){
  const v=LOCS.filter(l=>st(l)==='todo'&&l.lat&&l.lon);
  if(v.length)map.fitBounds(L.latLngBounds(v.map(l=>[l.lat,l.lon])),{padding:[40,40]});
}
map.on('click',()=>closeDp());

async function init(){
  document.getElementById('loadmsg').textContent='Statussen ophalen uit Google Sheets...';
  await syncSheets();
  document.getElementById('loadmsg').textContent='Adressen opzoeken...';
  await geocodeAll();
  document.getElementById('loading').style.display='none';
  render();zoomAll();
  setInterval(async()=>{await syncSheets();},2*60*1000);
}
init();
</script>
